---
# Only relevant under rivolution_install_method: source (the .deb
# download path never clones anything, so a git deploy key is
# meaningless there) and only runs when rivolution_deploy_key_path is
# supplied (e.g. by bootstrap.sh, or
# -e rivolution_deploy_key_path=/path/to/key). Skipped entirely when
# it's blank -- the default rivolution_git_repo is public, so this is
# only needed if you've repointed it at your own private fork, or the
# install user doesn't already have its own git credentials configured
# some other way.
#
# Takes a file path rather than the key content itself: Ansible's plain
# key=value extra-vars parsing splits on whitespace (including
# newlines), which silently truncates a multi-line PEM key passed
# directly as a value. A file path sidesteps that entirely.
- name: Set up a dedicated deploy key for the Rivolution repo
  when:
    - rivolution_install_method == 'source'
    - rivolution_deploy_key_path | default("") | length > 0
  block:
    - name: Create .ssh directory for the build user
      ansible.builtin.file:
        path: "{{ rivolution_home }}/.ssh"
        state: directory
        owner: "{{ rivolution_user }}"
        group: "{{ rivolution_user }}"
        mode: "0700"

    - name: Write the deploy private key
      ansible.builtin.copy:
        src: "{{ rivolution_deploy_key_path }}"
        dest: "{{ rivolution_home }}/.ssh/rivolution_deploy_key"
        remote_src: true
        owner: "{{ rivolution_user }}"
        group: "{{ rivolution_user }}"
        mode: "0600"

    - name: Scope the deploy key to github.com via SSH config
      ansible.builtin.blockinfile:
        path: "{{ rivolution_home }}/.ssh/config"
        create: true
        owner: "{{ rivolution_user }}"
        group: "{{ rivolution_user }}"
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - rivolution deploy key"
        block: |
          Host github.com
            IdentityFile {{ rivolution_home }}/.ssh/rivolution_deploy_key
            IdentitiesOnly yes

    - name: Pre-trust github.com's host key
      ansible.builtin.known_hosts:
        name: github.com
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"
        state: present
