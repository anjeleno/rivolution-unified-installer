---
- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Clone the Rivendell source tree
  become_user: "{{ rivendell_user }}"
  ansible.builtin.git:
    repo: "{{ rivendell_git_repo }}"
    dest: "{{ rivendell_home }}/rivendell"
    version: "{{ rivendell_git_ref }}"
    accept_hostkey: true

- name: Vendor the docbook titlepage template (not tracked in git, but docs/stylesheets/Makefile.am requires it unconditionally even with --disable-docs)
  ansible.builtin.copy:
    src: "/usr/share/xml/docbook/stylesheet/docbook-xsl-ns/template/{{ item }}"
    dest: "{{ rivendell_home }}/rivendell/helpers/docbook/template/{{ item }}"
    remote_src: true
    owner: "{{ rivendell_user }}"
    group: "{{ rivendell_user }}"
  loop:
    - titlepage.xml
    - titlepage.xsl

- name: Run autogen.sh
  become_user: "{{ rivendell_user }}"
  ansible.builtin.command:
    cmd: ./autogen.sh
    chdir: "{{ rivendell_home }}/rivendell"
    creates: "{{ rivendell_home }}/rivendell/configure"
  environment:
    DOCBOOK_STYLESHEETS: /usr/share/xml/docbook/stylesheet/docbook-xsl-ns

- name: Run configure
  become_user: "{{ rivendell_user }}"
  ansible.builtin.command:
    cmd: >
      ./configure {{ rivendell_configure_args | join(' ') }}
      MUSICBRAINZ_LIBS="-ldiscid -lmusicbrainz5cc -lcoverartcc"
    chdir: "{{ rivendell_home }}/rivendell"
    creates: "{{ rivendell_home }}/rivendell/Makefile"

- name: Compile (make -j{{ ansible_processor_vcpus | default(2) }})
  become_user: "{{ rivendell_user }}"
  ansible.builtin.command:
    cmd: "make -j{{ ansible_processor_vcpus | default(2) }}"
    chdir: "{{ rivendell_home }}/rivendell"

- name: Install compiled binaries
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ rivendell_home }}/rivendell"
