---
- name: Install git
  ansible.builtin.apt:
    name: git
    state: present

- name: Clone the Rivolution source tree
  become_user: "{{ rivolution_user }}"
  ansible.builtin.git:
    repo: "{{ rivolution_git_repo }}"
    dest: "{{ rivolution_home }}/rivolution"
    version: "{{ rivolution_git_ref }}"
    accept_hostkey: true

# configure_build.sh (shipped in the source tree) auto-detects the
# distro and runs both autogen.sh and the real ./configure with the
# right --prefix/--libdir/--libexecdir/--sysconfdir/MUSICBRAINZ_LIBS
# for it -- no need to hand-maintain those flags here. configure.ac's
# own DocBook detection also creates the helpers/docbook stylesheet
# symlink automatically now, so no manual vendoring step is needed
# either.
- name: Run configure_build.sh
  become_user: "{{ rivolution_user }}"
  ansible.builtin.command:
    cmd: ./configure_build.sh
    chdir: "{{ rivolution_home }}/rivolution"
    creates: "{{ rivolution_home }}/rivolution/Makefile"

- name: Compile (make -j{{ ansible_processor_vcpus | default(2) }})
  become_user: "{{ rivolution_user }}"
  ansible.builtin.command:
    cmd: "make -j{{ ansible_processor_vcpus | default(2) }}"
    chdir: "{{ rivolution_home }}/rivolution"

- name: Install compiled binaries
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ rivolution_home }}/rivolution"

# Required, not optional: without this, every Rivendell binary fails
# immediately with "error while loading shared libraries" even though
# the file genuinely exists -- make install doesn't refresh the
# linker's cache itself.
- name: Refresh the linker cache
  ansible.builtin.command:
    cmd: ldconfig
  changed_when: false
