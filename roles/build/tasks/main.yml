---
# Only runs under rivolution_install_method: source. Builds a real
# local .deb from a fresh git checkout (dpkg-buildpackage, via the main
# repo's own scripts/rebuild-deb.sh) instead of `make install`-ing
# directly -- the resulting file gets handed to roles/rivolution_deb,
# which installs it through the exact same `apt install <path>` step
# the download path uses. This is deliberate: it means debian/postinst
# -- the one place broadcast/PipeWire/rivapi provisioning is actually
# maintained -- runs identically regardless of install method, instead
# of this role trying to replicate that provisioning a second time in
# Ansible. See docs/specs/0004 for the full reasoning.
- name: Check whether Rivolution has already been built locally on this host
  ansible.builtin.stat:
    path: /etc/rivolution-build-provisioned
  register: rivolution_build_provisioned
  when: rivolution_install_method == 'source'

- name: Build a local .deb from source (first run only)
  when:
    - rivolution_install_method == 'source'
    - not rivolution_build_provisioned.stat.exists
  block:
    - name: Install git
      ansible.builtin.apt:
        name: git
        state: present

    # Detected ahead of the clone task itself so the failure message
    # below is clear and actionable, rather than relying on the git
    # module's own (more cryptic) refusal. rc != 0 covers both
    # "directory doesn't exist yet" and "exists but isn't a git repo
    # at all" -- in either case there are no local changes of the kind
    # this check cares about, so the next task proceeds normally
    # either way.
    - name: Check for local modifications in an existing source checkout
      become_user: "{{ rivolution_user }}"
      ansible.builtin.command:
        cmd: git status --porcelain
        chdir: "{{ rivolution_home }}/rivolution"
      register: rivolution_checkout_status
      changed_when: false
      failed_when: false
      when: not rivolution_build_force_clean

    # Refuses to silently discard real work -- see
    # rivolution_build_force_clean in group_vars/all.yml for the
    # explicit, opt-in way to clear this.
    - name: Fail clearly if local modifications would otherwise be discarded
      ansible.builtin.fail:
        msg: >-
          {{ rivolution_home }}/rivolution already exists with
          uncommitted local changes -- refusing to overwrite them.
          Back up or remove that directory yourself, or re-run with
          -e rivolution_build_force_clean=true to discard them and
          clone fresh.
      when:
        - not rivolution_build_force_clean
        - rivolution_checkout_status.rc is defined
        - rivolution_checkout_status.rc == 0
        - rivolution_checkout_status.stdout | trim != ''

    - name: Clone the Rivolution source tree
      become_user: "{{ rivolution_user }}"
      ansible.builtin.git:
        repo: "{{ rivolution_git_repo }}"
        dest: "{{ rivolution_home }}/rivolution"
        version: "{{ rivolution_git_ref }}"
        accept_hostkey: true
        force: "{{ rivolution_build_force_clean }}"

    # --no-bump builds whatever Debian revision is already committed in
    # debian/changelog.src/control.src as-is, without minting a new
    # one -- the same flag the main repo's own x64 CI workflow uses,
    # for the same reason: this is building an existing, already-
    # versioned checkout, not authoring a new release. Produces
    # rivolution_<version>_<arch>.deb (plus sub-package .debs) one
    # level above the checkout, i.e. directly in rivolution_home.
    - name: Build the .deb package (dpkg-buildpackage via rebuild-deb.sh)
      become_user: "{{ rivolution_user }}"
      ansible.builtin.command:
        cmd: scripts/rebuild-deb.sh --no-bump
        chdir: "{{ rivolution_home }}/rivolution"

- name: Mark this host's local build as provisioned
  ansible.builtin.file:
    path: /etc/rivolution-build-provisioned
    state: touch
    mode: "0644"
  when:
    - rivolution_install_method == 'source'
    - not rivolution_build_provisioned.stat.exists

# Deliberately outside the "first run only" block above: on a re-run
# (marker already present, nothing rebuilt this time) roles/rivolution_deb
# still needs to know where the .deb from the *previous* run landed.
# rivolution_*.deb (literal underscore) matches only the core package --
# rivolution-dev_/-importers_/-webapi_/etc. sub-packages all have a
# hyphen, not an underscore, right after "rivolution", so this glob
# can't accidentally pick one of those up instead.
- name: Locate the built core package
  ansible.builtin.find:
    paths: "{{ rivolution_home }}"
    patterns: "rivolution_*.deb"
  register: rivolution_built_deb
  when: rivolution_install_method == 'source'

- name: Fail clearly if no built .deb can be found
  ansible.builtin.fail:
    msg: >-
      No rivolution_*.deb found in {{ rivolution_home }} -- if this is
      the first run, check scripts/rebuild-deb.sh's output above; if
      it's a re-run, the file from the previous build may have been
      moved or deleted. Delete /etc/rivolution-build-provisioned to
      force a fresh build.
  when: rivolution_install_method == 'source' and rivolution_built_deb.matched == 0

- name: Record the built .deb's path for roles/rivolution_deb
  ansible.builtin.set_fact:
    rivolution_local_deb_path: "{{ (rivolution_built_deb.files | sort(attribute='mtime') | last).path }}"
  when: rivolution_install_method == 'source'
