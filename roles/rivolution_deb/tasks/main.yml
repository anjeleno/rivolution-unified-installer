---
# Installs Rivolution via a real .deb package either way -- downloaded
# from GitHub Releases (rivolution_install_method: deb, the default),
# or the local one roles/build just produced
# (rivolution_install_method: source). Either way, the actual
# provisioning (broadcast/PipeWire/rivapi/sudoers/udev/database/etc.)
# happens inside debian/postinst, unmodified -- this role's only job is
# getting a .deb file onto the box and telling apt to install it. See
# docs/specs/0004 for the full reasoning.

- name: Use the locally-built .deb (source install method)
  ansible.builtin.set_fact:
    rivolution_deb_path: "{{ rivolution_local_deb_path }}"
  when: rivolution_install_method == 'source'

- name: Resolve and download a released .deb (deb install method)
  when: rivolution_install_method == 'deb'
  block:
    # Verified 2026-07-20 (gh release view v6.0.0-rc1-2 --json
    # isDraft,isPrerelease -> both false) that rc-tagged releases here
    # are not marked GitHub prerelease, so /releases/latest correctly
    # returns them -- no need for the more defensive "list releases and
    # filter" approach.
    - name: Look up the latest published release
      ansible.builtin.uri:
        url: https://api.github.com/repos/anjeleno/rivolution/releases/latest
        return_content: true
      register: rivolution_latest_release
      when: rivolution_release_tag | length == 0

    - name: Look up the pinned release
      ansible.builtin.uri:
        url: "https://api.github.com/repos/anjeleno/rivolution/releases/tags/{{ rivolution_release_tag }}"
        return_content: true
      register: rivolution_pinned_release
      when: rivolution_release_tag | length > 0

    - name: Record the resolved release tag and asset list
      ansible.builtin.set_fact:
        rivolution_resolved_tag: >-
          {{
            (rivolution_pinned_release.json.tag_name
             if rivolution_release_tag | length > 0
             else rivolution_latest_release.json.tag_name)
          }}
        rivolution_release_assets: >-
          {{
            (rivolution_pinned_release.json.assets
             if rivolution_release_tag | length > 0
             else rivolution_latest_release.json.assets)
          }}

    # Matched by pattern against the release's real, actual asset
    # names -- not reconstructed from the tag. Confirmed live
    # 2026-07-20 (a real ansible-pull run) that the tag's own '-' form
    # ('~' substituted with '-', so tags can be valid git refs) is NOT
    # what GitHub's uploaded filenames use: those come from the
    # package's own internal version string instead, with GitHub's
    # *separate* automatic '~'->'.' substitution applied to that
    # ('6.0.0~rc1-2' -> '6.0.0.rc1-2') -- two different substitutions
    # of the same character, so building the filename from the tag
    # string looked right but matched nothing real. Matching against
    # the API's own asset list sidesteps needing to replicate either
    # substitution correctly.
    #
    # '^rivolution_' (literal underscore) excludes every sub-package
    # (rivolution-dev_/-importers_/-webapi_/etc. all have a hyphen,
    # not an underscore, right after "rivolution"). The amd64/
    # amd64-noble patterns are anchored at the end so 'amd64.deb'
    # doesn't also match 'amd64-noble.deb'. Debian isn't matched by any
    # pattern here -- no Debian-built .deb exists yet (tracked in the
    # main repo's BACKLOG.md); rivolution_install_method: source is the
    # only way to target Debian today.
    - name: Determine the release asset pattern for this host
      ansible.builtin.set_fact:
        rivolution_asset_pattern: >-
          {%- if ansible_facts['architecture'] == 'aarch64' -%}
          ^rivolution_.*_arm64\.deb$
          {%- elif ansible_facts['distribution_version'] is version('26.04', '>=') -%}
          ^rivolution_.*_amd64\.deb$
          {%- else -%}
          ^rivolution_.*_amd64-noble\.deb$
          {%- endif -%}

    - name: Find matching release assets
      ansible.builtin.set_fact:
        rivolution_matched_assets: >-
          {{
            rivolution_release_assets
            | selectattr('name', 'match', rivolution_asset_pattern)
            | list
          }}

    # Checked as a list length, not a truthiness/is-none check on a
    # single templated value -- avoids depending on whether this
    # ansible-core version preserves None as a native type through
    # set_fact versus stringifying it, which varies by version and
    # isn't worth relying on either way.
    - name: Fail clearly if this host's architecture/OS has no matching release asset
      ansible.builtin.fail:
        msg: >-
          No release asset found for {{ ansible_facts['architecture'] }}/
          {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
          in release {{ rivolution_resolved_tag }} (pattern
          {{ rivolution_asset_pattern }}). Debian targets in particular
          have no .deb release yet -- use -e rivolution_install_method=source
          instead, or check
          https://github.com/anjeleno/rivolution/releases/tag/{{ rivolution_resolved_tag }}
          for what's actually published.
      when: rivolution_matched_assets | length == 0

    - name: Record the matched asset
      ansible.builtin.set_fact:
        rivolution_matched_asset: "{{ rivolution_matched_assets | first }}"

    - name: Download the release asset
      ansible.builtin.get_url:
        url: "{{ rivolution_matched_asset.browser_download_url }}"
        dest: "/tmp/{{ rivolution_matched_asset.name }}"
        mode: "0644"

    - name: Record the downloaded .deb's path
      ansible.builtin.set_fact:
        rivolution_deb_path: "/tmp/{{ rivolution_matched_asset.name }}"

# Naturally idempotent: apt no-ops if the exact same package version is
# already installed. postinst does everything else from here --
# database, systemd units, sudoers, udev, .asoundrc, Apache, setuid
# helpers, the lot (see debian/postinst in the main repo, or
# docs/specs/0004's requirements-checklist table for the full list).
- name: Install the Rivolution .deb
  ansible.builtin.apt:
    deb: "{{ rivolution_deb_path }}"
