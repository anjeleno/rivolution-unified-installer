---
- name: Update apt cache and upgrade existing packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ rivendell_hostname }}"
  when: rivendell_hostname != "localhost"

- name: Pin 127.0.1.1 to the new hostname in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1\t{{ rivendell_hostname }}"
  when: rivendell_hostname != "localhost"

- name: Create the unprivileged build/desktop user
  ansible.builtin.user:
    name: "{{ rivendell_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Allow the build user passwordless sudo
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/90-{{ rivendell_user }}"
    content: "{{ rivendell_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Install build dependencies
  ansible.builtin.apt:
    name:
      - apache2
      - libexpat1-dev
      - libexpat1
      - libid3-dev
      - libcurl4-gnutls-dev
      - libcoverart-dev
      - libdiscid-dev
      - libmusicbrainz5-dev
      - libcdparanoia-dev
      - libsndfile1-dev
      - libpam0g-dev
      - libvorbis-dev
      - python3
      - python3-pycurl
      - python3-pymysql
      - python3-serial
      - python3-requests
      - python3-venv
      - python3-virtualenv
      - python3-build
      - twine
      - libsamplerate0-dev
      - qtbase5-dev
      - libqt5sql5-mysql
      - libqt5webkit5-dev
      - libsoundtouch-dev
      - libsystemd-dev
      - libjack-jackd2-dev
      - libasound2-dev
      - libflac-dev
      - libflac++-dev
      - libmp3lame-dev
      - libmad0-dev
      - libtwolame-dev
      - docbook5-xml
      - libxml2-utils
      - docbook-xsl-ns
      - xsltproc
      - fop
      - make
      - g++
      - libltdl-dev
      - autoconf
      - automake
      - libssl-dev
      - libtag1-dev
      - qttools5-dev-tools
      - debhelper
      - openssh-server
      - autoconf-archive
      - gnupg
      - apt-file
      - libmagick++-dev
      - docbook-xsl
      - "linux-modules-extra-{{ ansible_kernel }}"
    state: present
