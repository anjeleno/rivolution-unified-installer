---
- name: Update apt cache and upgrade existing packages
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ rivolution_hostname }}"
  when: rivolution_hostname != "localhost"

- name: Pin 127.0.1.1 to the new hostname in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1\t{{ rivolution_hostname }}"
  when: rivolution_hostname != "localhost"

- name: Set timezone
  community.general.timezone:
    name: "{{ rivolution_timezone }}"
  when: rivolution_timezone | length > 0

# Matches the manual walkthrough in rivolution.wiki's Build-From-Source
# guide -- dpkg-reconfigure's debconf prompt is interactive by design,
# but site.yml already sets DEBIAN_FRONTEND=noninteractive, so this
# applies the system's already-configured default non-interactively
# rather than blocking on a prompt that can never be answered.
- name: Set NTP time sync
  ansible.builtin.command:
    cmd: timedatectl set-ntp yes
  changed_when: false

- name: Create the unprivileged install/desktop user
  ansible.builtin.user:
    name: "{{ rivolution_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

# deb-multimedia.org provides the non-free codec packages
# (libmp3lame-dev/libtwolame-dev/etc.) that Ubuntu ships directly via
# universe/multiverse but Debian's free-software policy excludes from
# its own main repos. Only needed under rivolution_install_method:
# source -- the .deb path never compiles anything, so it never needs
# these -dev packages at all.
- name: Add the deb-multimedia repo (Debian, source install method only)
  when: rivolution_target_os == 'debian' and rivolution_install_method == 'source'
  block:
    - name: Download the deb-multimedia keyring package
      ansible.builtin.get_url:
        url: https://www.deb-multimedia.org/pool/main/d/deb-multimedia-keyring/deb-multimedia-keyring_2024.9.1_all.deb
        dest: /tmp/deb-multimedia-keyring.deb
        mode: "0644"

    - name: Install the deb-multimedia keyring
      ansible.builtin.apt:
        deb: /tmp/deb-multimedia-keyring.deb

    - name: Add the deb-multimedia repo
      ansible.builtin.apt_repository:
        repo: "deb https://www.deb-multimedia.org {{ ansible_facts['distribution_release'] }} main non-free"
        filename: deb-multimedia
        state: present
        update_cache: true

# Only needed to compile Rivolution itself -- the .deb path (default)
# gets every one of these as a transitive apt Depends automatically
# when roles/rivolution_deb installs the package, so it never needs
# this list at all. Reconciled against rivolution.wiki's
# Build-From-Source guide, which is the canonical maintained source for
# this list -- re-check there if this ever needs updating. Qt6, not
# Qt5 -- libqt5webkit5-dev has no Qt6 equivalent at all, replaced by
# qt6-webengine-dev.
- name: Install build dependencies (source install method only)
  ansible.builtin.apt:
    name:
      - git
      - g++
      - automake
      - autoconf
      - autoconf-archive
      - libtool
      - libltdl-dev
      - make
      - debhelper
      - qt6-base-dev
      - qt6-base-dev-tools
      - qt6-l10n-tools
      - qt6-webengine-dev
      - qt6-webengine-dev-tools
      - libqt6sql6-mysql
      - libexpat1-dev
      - libexpat1
      - libid3-dev
      - libcurl4-gnutls-dev
      - libcoverart-dev
      - libdiscid-dev
      - libmusicbrainz5-dev
      - libcdparanoia-dev
      - libsndfile1-dev
      - libpam0g-dev
      - libvorbis-dev
      - libsamplerate0-dev
      - libsoundtouch-dev
      - libsystemd-dev
      - libjack-jackd2-dev
      - libasound2-dev
      - libflac-dev
      - libflac++-dev
      - libmp3lame-dev
      - libmad0-dev
      - libtwolame-dev
      - libssl-dev
      - libtag1-dev
      - libmagick++-dev
      - alsa-utils
      - alsa-tools
      - alsa-tools-gui
      - alsa-firmware-loaders
      - libasound2-plugins
      - docbook5-xml
      - docbook-xsl-ns
      - xsltproc
      - fop
      - libxml2-utils
      - python3
      - python3-pycurl
      - python3-pymysql
      - python3-serial
      - python3-requests
      - python3-venv
      - python3-virtualenv
      - python3-build
      - twine
      - apache2
      - mariadb-server
      - mariadb-client
      - mp3gain
      - openssh-server
      - gnupg
      - pbuilder
      - apt-file
    state: present
  when: rivolution_install_method == 'source'

# ubuntu-dev-tools is literally Ubuntu-branded -- no Debian equivalent
# at all (pbuilder itself, already installed above, is what the build
# actually needs). Only needed to compile from source.
- name: Install ubuntu-dev-tools (Ubuntu, source install method only)
  ansible.builtin.apt:
    name: ubuntu-dev-tools
    state: present
  when: rivolution_target_os == 'ubuntu' and rivolution_install_method == 'source'

# linux-modules-extra-<kernel> also doesn't exist on Debian (its extra
# audio/hardware kernel modules ship in the base linux-image package
# instead there) -- but even on Ubuntu it's not guaranteed to exist for
# every exact kernel build. Seen failing outright on a real ARM64
# 26.04 box running kernel 7.0.0-22-generic, where the archive had no
# matching linux-modules-extra package published for that build at
# all. Checked via apt-cache rather than just letting apt fail, so a
# missing optional extras package can't block the rest of this role --
# this is just additional ALSA/hardware modules beyond what the base
# kernel image ships, only relevant on real hardware to begin with.
# Runs regardless of install method -- this is about kernel/hardware
# support, not about building Rivolution.
- name: Check whether linux-modules-extra is available for this kernel (Ubuntu only)
  ansible.builtin.command:
    cmd: apt-cache show "linux-modules-extra-{{ ansible_facts['kernel'] }}"
  register: linux_modules_extra_check
  changed_when: false
  failed_when: false
  when: rivolution_target_os == 'ubuntu'

- name: Install linux-modules-extra for this kernel (Ubuntu only)
  ansible.builtin.apt:
    name: "linux-modules-extra-{{ ansible_facts['kernel'] }}"
    state: present
  when: rivolution_target_os == 'ubuntu' and linux_modules_extra_check.rc == 0

- name: Warn that linux-modules-extra isn't available for this kernel (Ubuntu only)
  ansible.builtin.debug:
    msg: >-
      linux-modules-extra-{{ ansible_facts['kernel'] }} isn't published in the
      configured repos for this exact kernel build -- continuing
      without it. Only matters for extra ALSA/hardware modules beyond
      what the base kernel image already ships.
  when: rivolution_target_os == 'ubuntu' and linux_modules_extra_check.rc != 0
