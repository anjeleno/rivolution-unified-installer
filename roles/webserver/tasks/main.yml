---
# rd-bin.conf itself needs no manual symlinking here: roles/build now
# runs configure_build.sh, which sets --sysconfdir=/etc/apache2/conf-enabled
# directly, so `make install` already drops it at its final location
# (conf/Makefile.am installs it to $(sysconfdir)/rd-bin.conf).

- name: Enable Apache CGI module (conf)
  ansible.builtin.file:
    src: ../mods-available/cgid.conf
    dest: /etc/apache2/mods-enabled/cgid.conf
    state: link
    force: true

- name: Enable Apache CGI module (load)
  ansible.builtin.file:
    src: ../mods-available/cgid.load
    dest: /etc/apache2/mods-enabled/cgid.load
    state: link
    force: true

- name: Restart Apache
  ansible.builtin.systemd:
    name: apache2
    state: restarted
    enabled: true
