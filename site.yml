---
# Full Rivolution golden-image provisioning, derived from the manual
# golden-image.md build log. Targets a fresh Ubuntu 24.04/26.04 or
# Debian Trixie install -- Droplet, UTM VM, or physical hardware --
# reachable as root (or any sudo-capable account) over SSH, or run
# locally via ansible-pull.
- hosts: all
  become: true
  # Fully unattended (cloud-init/ansible-pull, no TTY) -- without this,
  # any package whose postinst tries a debconf prompt (interactive
  # frontend) hangs forever waiting for input that can never arrive.
  environment:
    DEBIAN_FRONTEND: noninteractive
  roles:
    - base
    - broadcast_tools
    - desktop
    - database
    - deploy_key
    - build
    - webserver
    - provision
    - broadcast_advanced
